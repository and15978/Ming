name: Backfill History

on:
  workflow_dispatch:
    inputs:
      days:
        description: '要往回補抓幾個交易日（V2雷達建議60天）'
        required: false
        default: '60'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run backfill.py
        run: python3 backfill.py "${{ github.event.inputs.days }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "auto: backfill history data"
          git push
