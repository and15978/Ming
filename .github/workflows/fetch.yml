name: Daily TWSE Fetch

on:
  schedule:
    # 06:00 UTC = 台灣時間 14:00（收盤後30分鐘，資料通常已公布）
    - cron: '0 6 * * 1-5'
    # 07:00 UTC = 台灣時間 15:00（備援，若14:00還沒抓到就再補一次）
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '要抓的交易日期（留空=抓最新；回補歷史請填 YYYYMMDD，例如 20260714）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch TWSE data
        run: python3 fetch_twse.py "${{ github.event.inputs.date }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "auto: TWSE data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
