name: Daily TWSE Fetch

on:
  schedule:
    # 台灣時間 14:00（UTC 06:00）— 收盤後30分鐘
    - cron: '0 6 * * 1-5'
    # 台灣時間 15:00（UTC 07:00）— 備援一
    - cron: '0 7 * * 1-5'
    # 台灣時間 17:00（UTC 09:00）— 備援二
    - cron: '0 9 * * 1-5'
    # 台灣時間 22:00（UTC 14:00）— 備援三（確保隔天早上一定有資料）
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '要抓的交易日期（留空=抓最新；回補歷史請填 YYYYMMDD，例如 20260715）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch TWSE data
        run: python3 fetch_twse.py "${{ github.event.inputs.date }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "auto: TWSE data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
