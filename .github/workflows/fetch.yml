name: Daily TWSE Fetch

on:
  schedule:
    # 06:30 UTC = 台灣時間 14:30（收盤後約一小時，確保資料已公布），週一到週五
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '要抓的交易日期（留空=抓最新；回補歷史請填 YYYYMMDD，例如 20260713）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch TWSE data
        run: python3 fetch_twse.py "${{ github.event.inputs.date }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "auto: TWSE data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
