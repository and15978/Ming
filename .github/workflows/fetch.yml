name: Daily TWSE Fetch

on:
  schedule:
    # 06:30 UTC = �蝱������ 14:30嚗�𤣰�𥿢敺䕘�㚁���齿�务TC���曹����曹��
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '閬���梶�鈭斗�𤘪𠯫������嗵征=��𤘪��鰵嚗𥡝���噼�𨀣風�蟮隢见‵ YYYYMMDD嚗䔶�见� 20260623嚗�'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch TWSE data
        run: python3 fetch_twse.py "${{ github.event.inputs.date }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "�䌊��閙凒�鰵霅劐漱��鞈��� $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
